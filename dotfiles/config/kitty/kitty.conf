# Theme Configuration
include ./themes/catppuccin-mocha.conf

# Font Configuration
font_family      family='JetBrainsMono Nerd Font Mono' style=Light features='+zero +ss02 +cv04 +cv16 +cv18 +cv19 +cv20'
bold_font        family='JetBrainsMono Nerd Font Mono' style=Bold features='+zero +ss02 +cv04 +cv16 +cv18 +cv19 +cv20'
italic_font      family='JetBrainsMono Nerd Font Mono' style='Light Italic' features='+zero +ss02 +cv04 +cv16 +cv18 +cv19 +cv20'
bold_italic_font family='JetBrainsMono Nerd Font Mono' style='Bold Italic' features='+zero +ss02 +cv04 +cv16 +cv18 +cv19 +cv20'
font_size        16

# Fix for small size nerd font icons
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF,U+100000-U+10ffff JetBrainsMonoNL Nerd Font

# Cursor and Appearance
cursor_shape         underline
cursor_trail          0
cursor_blink_interval 0

# Mouse Behavior
mouse_hide_wait 2.0

# Shell Integration
shell_integration no-cursor

# URL Behavior
url_style straight

# Mac OS related
hide_window_decorations titlebar-only
macos_show_window_title_in none
macos_menubar_title_max_length 0
# macos_traditional_fullscreen yes

# Window and UI Behavior
window_border_width     1
window_margin_width     0
window_padding_width    5
# background_opacity      0.85
# background_blur         50
scrollbar               never
enable_audio_bell       no
confirm_os_window_close 0

# Tab Configuration
tab_title_template   "{index}: {title.split('/')[-1]}"
tab_title_max_length 15
tab_bar_style        powerline
tab_powerline_style  slanted
tab_switch_strategy  left

# Remote Control
# allow_remote_control socket-only
# listen_on            unix:/tmp/kitty

# # # Keybindings
clear_all_shortcuts yes

## Tab Navigation
map command+t           new_tab
map command+w           close_tab
##
# Fix for karabiner elements
map ctrl+shift+left     prev_tab
map ctrl+shift+right    next_tab
##
map command+tab         next_tab
map command+shift+tab   previous_tab
map command+;           new_tab_with_cwd
map command+.           move_tab_forward
map command+,           move_tab_backward

## Tab Goto
map command+1 goto_tab 1
map command+2 goto_tab 2
map command+3 goto_tab 3
map command+4 goto_tab 4
map command+5 goto_tab 5
map command+6 goto_tab 6
map command+7 goto_tab 7
map command+8 goto_tab 8
map command+9 goto_tab 99

## Clipboard & Unicode Input
map command+c copy_to_clipboard
map command+v paste_from_clipboard
map command+u kitten unicode_input

## Window & Reload Config
map command+enter       new_os_window
map command+shift+enter new_os_window_with_cwd
map command+r           load_config_file

## Font Size Control
map command+0     change_font_size all 0
map command+equal change_font_size all +2.0
map command+minus change_font_size all -2.0

## Scrolling
map command+up   scroll_line_up
map command+down scroll_line_down
map command+shift+up scroll_page_up
map command+shift+down scroll_page_down
